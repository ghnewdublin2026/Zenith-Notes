<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith | Own Your Focus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
        .gradient-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 99px; background: #6366f1; cursor: pointer; border: 2px solid white; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-300 selection:bg-indigo-500/30">

    <nav class="flex justify-between items-center px-8 py-6 max-w-7xl mx-auto">
        <div class="text-white font-bold text-2xl tracking-tighter italic">ZENITH</div>
        <a href="#" class="px-5 py-2 bg-indigo-600 text-white rounded-full text-sm font-medium hover:bg-indigo-500 transition shadow-lg shadow-indigo-500/20">Launch App</a>
    </nav>

    <section class="max-w-4xl mx-auto px-6 pt-12 pb-32">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold text-white mb-4">Try the <span class="gradient-text">30-Second Rule</span></h1>
            <p class="text-zinc-400">Experience how Zenith captures your flow in real-time.</p>
        </div>

        <div class="glass border border-white/10 rounded-3xl p-6 shadow-2xl max-w-md mx-auto">
            
            <div id="log-feed" class="space-y-3 mb-6 h-64 overflow-y-auto pr-2 flex flex-col-reverse">
                <div class="p-3 bg-zinc-900/50 rounded-xl border border-white/5 text-sm italic text-zinc-500 text-center">
                    Your day is empty. Log something below.
                </div>
            </div>

            <div class="bg-zinc-900 rounded-2xl p-4 border border-indigo-500/30 shadow-inner">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Current Energy</span>
                    <span id="energy-val" class="text-sm font-bold text-indigo-400">5/10</span>
                </div>
                
                <input type="range" id="energy-slider" min="1" max="10" value="5" 
                    class="w-full h-1.5 bg-zinc-800 rounded-lg appearance-none cursor-pointer mb-6">
                
                <div class="relative">
                    <input type="text" id="log-input" placeholder="What's happening right now?" 
                        class="w-full bg-zinc-800 border-none rounded-xl py-3 pl-4 pr-12 text-sm text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                    <button id="send-btn" class="absolute right-2 top-1.5 p-1.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-500 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <script>
        const slider = document.getElementById('energy-slider');
        const energyVal = document.getElementById('energy-val');
        const logInput = document.getElementById('log-input');
        const sendBtn = document.getElementById('send-btn');
        const feed = document.getElementById('log-feed');

        // Update Energy Display
        slider.addEventListener('input', () => {
            energyVal.textContent = `${slider.value}/10`;
            const colors = ['#f87171', '#fb923c', '#fbbf24', '#818cf8', '#34d399'];
            const idx = Math.floor((slider.value - 1) / 2);
            energyVal.style.color = colors[idx];
        });

        // Add Entry Function
        function addEntry() {
            const text = logInput.value.trim();
            if (!text) return;

            // Remove placeholder
            if (feed.children[0] && feed.children[0].classList.contains('text-zinc-500')) {
                feed.innerHTML = '';
            }

            const energy = slider.value;
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            // Determine Tint
            const tint = energy > 7 ? 'border-emerald-500/20 bg-emerald-500/5' : 
                         energy < 4 ? 'border-orange-500/20 bg-orange-500/5' : 
                         'border-indigo-500/20 bg-indigo-500/5';

            const entry = document.createElement('div');
            entry.className = `p-3 rounded-xl border ${tint} flex justify-between items-start animate-slide-in`;
            entry.innerHTML = `
                <div>
                    <p class="text-white text-sm">${text}</p>
                    <span class="text-[10px] text-zinc-500 uppercase">${time}</span>
                </div>
                <span class="text-xs font-bold px-2 py-0.5 rounded-md bg-white/5">${energy}/10</span>
            `;

            feed.appendChild(entry);
            logInput.value = '';
            
            // Focus reset
            logInput.focus();
        }

        sendBtn.addEventListener('click', addEntry);
        logInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addEntry(); });
    </script>

    <style>
        @keyframes slide-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-in { animation: slide-in 0.3s ease-out forwards; }
    </style>
</body>
</html>
